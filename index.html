    const templates={
      home:()=>`<div class="page-head"><div><p class="eyebrow">Centro operativo</p><h1>Buenos días, Neural Partner</h1><p>Todo lo que necesita atención hoy, reunido en un único lugar.</p></div><button class="primary" data-action="task">+ Nueva tarea</button></div><section class="grid stats"><div class="card"><span class="stat-label">Tareas abiertas</span><div class="stat-value">12</div><span class="up">↑ 3 esta semana</span></div><div class="card"><span class="stat-label">Eventos próximos</span><div class="stat-value">4</div><span class="up">Esta semana</span></div><div class="card"><span class="stat-label">Colecciones</span><div class="stat-value">6</div><span class="up">156 registros</span></div><div class="card"><span class="stat-label">Actividad</span><div class="stat-value">28</div><span class="up">↑ Actualizada hoy</span></div></section><section class="grid dashboard"><div class="card"><h2>Ritmo de trabajo</h2><div class="chart"><i class="bar" style="height:38%"></i><i class="bar" style="height:57%"></i><i class="bar" style="height:44%"></i><i class="bar" style="height:76%"></i><i class="bar" style="height:62%"></i><i class="bar" style="height:88%"></i><i class="bar" style="height:70%"></i><i class="bar" style="height:96%"></i></div></div><div class="card"><h2>Próximamente</h2><div class="row"><i class="dot"></i><div class="grow"><strong>Revisión de sprint</strong><small>Hoy · 16:00</small></div><span class="badge">Equipo</span></div><div class="row"><i class="dot purple"></i><div class="grow"><strong>Actualizar contenidos</strong><small>Mañana · 10:30</small></div><span class="badge muted">Marketing</span></div><div class="row"><i class="dot amber"></i><div class="grow"><strong>Preparar lanzamiento</strong><small>Viernes · 12:00</small></div><span class="badge amber">Prioridad</span></div></div><div class="card"><h2>Trabajo pendiente</h2><div class="row"><div class="avatar">AS</div><div class="grow"><strong>Validar importación CSV</strong><small>Colección · Solicitudes</small></div><span class="badge amber">Hoy</span></div><div class="row"><div class="avatar">LM</div><div class="grow"><strong>Revisar permisos de equipo</strong><small>Ajustes · Roles</small></div><span class="badge muted">Mañana</span></div></div><div class="card"><h2>Actividad reciente</h2><div class="row"><i class="dot"></i><div><strong>Nuevo registro en Solicitudes</strong><small>Hace 12 minutos</small></div></div><div class="row"><i class="dot purple"></i><div><strong>Lucía actualizó una tarea</strong><small>Hace 43 minutos</small></div></div><div class="row"><i class="dot amber"></i><div><strong>Se modificó la configuración de marca</strong><small>Ayer</small></div></div></div></section>`,
      collections:()=>`<div class="page-head"><div><p class="eyebrow">Datos configurables</p><h1>Colecciones</h1><p>Organiza los datos operativos con campos y permisos por rol.</p></div><button class="primary" data-action="collection">+ Nueva colección</button></div><div class="filters"><input class="search" placeholder="Buscar colecciones"><button class="secondary">Ordenar: reciente</button></div><section class="collection-grid"><article class="collection"><span class="badge">6 campos</span><h2>Solicitudes</h2><p>Entradas recibidas desde canales de soporte y contacto.</p><div class="count">48 <small>registros</small></div></article><article class="collection"><span class="badge muted">4 campos</span><h2>Proyectos</h2><p>Iniciativas activas y seguimiento de su estado.</p><div class="count">18 <small>registros</small></div></article><article class="collection"><span class="badge amber">5 campos</span><h2>Clientes</h2><p>Información de cuentas y responsables de contacto.</p><div class="count">90 <small>registros</small></div></article></section><section class="card" style="margin-top:18px"><h2>Solicitudes · registros recientes</h2><div class="table-wrap"><table class="table"><thead><tr><th>Título</th><th>Estado</th><th>Responsable</th><th>Actualizado</th></tr></thead><tbody><tr><td>Consulta de integración</td><td><span class="badge">Abierto</span></td><td>Lucía Martín</td><td>Hoy, 09:42</td></tr><tr><td>Revisión de propuesta</td><td><span class="badge amber">En curso</span></td><td>Alex Soto</td><td>Ayer</td></tr><tr><td>Documentación inicial</td><td><span class="badge muted">Cerrado</span></td><td>Neural Partner</td><td>12 jul.</td></tr></tbody></table></div></section>`,

    const englishNav=['Dashboard','Analytics','Users','Products','Collections','Tasks','Calendar','Planning','Reports','Audit log','Settings','Documentation'];const spanishNav=['Dashboard','Analytics','Usuarios','Productos','Colecciones','Tareas','Calendario','Planificación','Informes','Auditoría','Ajustes','Documentación'];function setNavLabels(){const labels=language.value==='en'?englishNav:spanishNav;document.querySelectorAll('#nav button').forEach((button,index)=>button.childNodes[1].textContent=' '+labels[index]);document.querySelector('.nav-title').textContent=language.value==='en'?'WORKSPACE':'ESPACIO DE TRABAJO';document.querySelector('.profile small').textContent=language.value==='en'?'Administrator':'Administrador';}
    const originalRender=render;function render(page){const contentPage=aliases[page]||page;let html=templates[contentPage]();if($('#language')?.value==='en')html=Object.entries(englishCopy).sort((a,b)=>b[0].length-a[0].length).reduce((out,[from,to])=>out.split(from).join(to),html);view.innerHTML=html;crumb.textContent=$('#language')?.value==='en'?englishTitle[page]:title[page];document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));history.replaceState(null,'','/'+page);view.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>show('This action is available in the installed product.'));}
